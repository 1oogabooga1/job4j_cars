<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>
<div class="container">
    <form class="mt-3" th:action="@{/posts/create}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="description" class="form-label"><b>Description</b></label>
            <textarea class="form-control" id="description" name="description" rows="5"
                      placeholder="Post description"></textarea>
        </div>

        <div class="mb-3">
            <label for="formFile"><b>Photo</b></label>
            <input class="form-control form-control-sm w-100" type="file" id="formFile" name="file" required>
        </div>

        <div class="mb-3">
            <label for="car.brand"><b>Car Brand</b></label>
            <select class="form-control" id="car.brand" name="car.brand.id">
                <option th:each="brand : ${brands}"
                        th:value="${brand.id}" th:text="${brand.name}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="car.engine"><b>Car Engine</b></label>
            <select class="form-control" id="car.engine" name="car.engine.id">
                <option th:each="engine : ${engines}"
                        th:value="${engine.id}" th:text="${engine.name}"></option>
            </select>
        </div>
        <div class="mb-3 row">
            <div class="col-6"></div>
            <div class="col-6">
                <div class="row">
                    <div class="col-6"><button class="btn btn-primary w-100" type="submit">Save</button></div>
                    <div class="col-6"><a class="btn btn-danger w-100" th:href="@{/posts/allPosts}">Cancel</a> </div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
